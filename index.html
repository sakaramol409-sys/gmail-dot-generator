<script>

function generate(){

const email=document.getElementById("email").value.trim();

if(!email.endsWith("@gmail.com")){
alert("Please enter a valid Gmail address");
return;
}

let username=email.replace("@gmail.com","").replace(/\./g,"");

if(username.length>15){
alert("Username too long!");
return;
}

let total=Math.pow(2,username.length-1);

let results=[];

for(let i=0;i<total;i++){

let binary=i.toString(2).padStart(username.length-1,"0");

let newEmail="";

for(let j=0;j<username.length;j++){

newEmail+=username[j];

if(j<username.length-1 && binary[j]==="1"){
newEmail+=".";
}

}

results.push(newEmail+"@gmail.com");

}

const output=document.getElementById("output");

document.getElementById("count").innerText="Total variations: "+results.length;

output.value=results.join("\n");

output.style.height="auto";

output.style.height=output.scrollHeight+"px";

/* اظهار اعلان النوتيف */

const tempAd=document.getElementById("tempAd");

tempAd.style.display="block";

const closeBtn=tempAd.querySelector(".close-btn");

closeBtn.style.display="none";

setTimeout(()=>{
closeBtn.style.display="block";
},3000);

}

function closeTempAd(){

document.getElementById("tempAd").style.display="none";

}

</script>
