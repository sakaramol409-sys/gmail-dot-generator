<!-- Native Banner / إعلان مؤقت بعد الضغط على Generate -->
<div id="tempAd" class="temp-ad" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:none;flex-direction:column;align-items:center;z-index:9999;max-width:90%;width:320px;background:#fff;padding:10px;border-radius:10px;box-shadow:0 8px 20px rgba(0,0,0,0.3);">
  <span class="close-btn" onclick="closeTempAd()" style="display:none;position:absolute;top:5px;right:5px;background:#333;color:white;font-weight:bold;padding:2px 6px;cursor:pointer;border-radius:50%;z-index:10;">×</span>
  <script async="async" data-cfasync="false" src="https://pl28884379.effectivegatecpm.com/e523158d22e7e93b836ae1a3c48887bf/invoke.js"></script>
  <div id="container-e523158d22e7e93b836ae1a3c48887bf" style="width:100%;"></div>
</div>

<script>
function generate() {
  const email = document.getElementById("email").value.trim();
  if (!email.endsWith("@gmail.com")) { alert("Please enter a valid Gmail address"); return; }

  let username = email.replace("@gmail.com","").replace(/\./g,"");
  if(username.length>15){ alert("Username too long!"); return; }
  let total = Math.pow(2, username.length-1);
  let results = [];

  for (let i=0;i<total;i++){
    let binary=i.toString(2).padStart(username.length-1,"0");
    let newEmail="";
    for (let j=0;j<username.length;j++){
      newEmail+=username[j];
      if(j<username.length-1 && binary[j]==="1") newEmail+=".";
    }
    results.push(newEmail+"@gmail.com");
  }

  document.getElementById("count").innerText="Total variations: "+results.length;
  document.getElementById("output").value=results.join("\n");

  // إظهار البانر المؤقت
  const tempAd = document.getElementById("tempAd");
  tempAd.style.display="flex";

  // إخفاء زر الإغلاق مؤقتًا
  const closeBtn = tempAd.querySelector(".close-btn");
  closeBtn.style.display="none";

  // إظهار زر الإغلاق بعد 3 ثواني
  setTimeout(()=>{ closeBtn.style.display="block"; },3000);
}

function closeTempAd(){
  document.getElementById("tempAd").style.display="none";
}
</script>

<style>
/* تخصيص استجابة البانر المؤقت للأجهزة الصغيرة */
@media (max-width:480px){
  #tempAd {
    width:90%;
    max-width:300px;
    padding:8px;
  }
  #tempAd .close-btn {
    top:3px;
    right:3px;
    padding:2px 5px;
  }
}
</style>
